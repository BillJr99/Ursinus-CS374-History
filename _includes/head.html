<head>
    <meta charset="utf-8">
    <title>{{ site.reveal.title }}</title>
    <meta name="description" content="A framework for easily creating beautiful presentations using HTML">
    <meta name="author" content="Hakim El Hattab">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Favicon-->
    <link rel="shortcut icon" href="{{ site.favicon | relative_url }}" type="image/x-icon">

    <!-- Canonical -->
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">

    <!-- RSS -->
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ 'feed.xml' | absolute_url }}"/>

    <!-- Theme used for syntax highlighting of code -->
    <link rel="stylesheet" href="{{ 'assets/lib/css/monokai.css' | relative_url }}">
    <link rel="stylesheet" href="{{ 'assets/css/rouge-highlight/monokai.css' | relative_url }}">

    <!-- Reveal CSS -->
    <link rel="stylesheet" href="{{ 'assets/css/reset.css' | relative_url }}">
    <link rel="stylesheet" href="{{ 'assets/css/reveal.css' | relative_url }}">
    <link rel="stylesheet" href="{{ 'assets/css/theme/' | relative_url }}{{ site.reveal.theme }}.css" id="theme">

    <!-- Fit adjustments: shrink code/tables/quotes so dense slides fit; keep prose large -->
    <style>
      .reveal pre { width: 100%; margin: 8px auto; box-shadow: none; font-size: 0.38em; }
      .reveal pre code { line-height: 1.18; padding: 8px 12px; }
      .reveal h1, .reveal h2, .reveal h3 { line-height: 1.1; margin-bottom: 14px; }
      .reveal table { font-size: 0.55em; }
      .reveal table th, .reveal table td { padding: 0.2em 0.4em; }
      .reveal blockquote { font-size: 0.72em; width: 92%; padding: 10px 16px; }
      .reveal section img { max-height: 290px; max-width: 86%; height: auto; width: auto; box-sizing: border-box; }
      .reveal p { line-height: 1.2; margin-bottom: 0.4em; }
      .reveal li { line-height: 1.2; }
      .reveal ol, .reveal ul { margin-bottom: 0.2em; }
    </style>

    <!-- Printing and PDF exports -->
    <script>
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.type = 'text/css';
      link.href = window.location.search.match(/print-pdf/gi) ? "{{ 'assets/css/print/pdf.css' | relative_url }}" : "{{ 'assets/css/print/paper.css' | relative_url }}";
      document.getElementsByTagName('head')[0].appendChild(link);
    </script>

</head>
